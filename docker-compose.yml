services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: flowmind-postgres
    environment:
      POSTGRES_DB: flowmind
      POSTGRES_USER: flowmind
      POSTGRES_PASSWORD: flowmind
    ports:
      - "5432:5432"
    volumes:
      - flowmind-postgres:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowmind -d flowmind"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: flowmind-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: flowmind-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://flowmind:flowmind@postgres:5432/flowmind
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: flowmind-web
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  flowmind-postgres:
